apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-management

spec:
  replicas: 1

  selector:
    matchLabels:
      app: employee-management

  template:
    metadata:
      labels:
        app: employee-management

    spec:
      containers:
      - name: employee-management

        image: 733050719452.dkr.ecr.eu-north-1.amazonaws.com/employee-management:1.0
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"
