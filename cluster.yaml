apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: employee-management-cluster
  region: eu-north-1

managedNodeGroups:
  - name: employee-management-nodes

    instanceType: t3.small

    desiredCapacity: 2
    minSize: 2
    maxSize: 2

    volumeSize: 20

    ssh:
      allow: false
